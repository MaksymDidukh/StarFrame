<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Rein Images</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at bottom, #1B2735 0%, #090A0F 100%);
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="spaceCanvas"></canvas>

<script>
// ==================== МАССИВ КАРТИНОК ЗВЁЗД (дополняй сколько угодно) ====================
const starImagesUrls = [
    "https://i.imgur.com/7ZfK8pL.png",   // основная красивая
    "https://i.imgur.com/8vX9kLm.png",
    "https://i.imgur.com/J3pL5qR.png",
    "https://i.imgur.com/XkP9mN2.png",
    // Добавляй новые сюда:
    // "https://твоя-ссылка.png",
];

const starImages = [];

function preloadImages(callback) {
    let loaded = 0;
    starImagesUrls.forEach((url, index) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = url;
        img.onload = () => {
            starImages[index] = img;
            loaded++;
            if (loaded === starImagesUrls.length) callback();
        };
        img.onerror = () => {
            console.warn(`Не загрузилась: ${url}`);
            loaded++;
            if (loaded === starImagesUrls.length) callback();
        };
    });
}

const canvas = document.getElementById('spaceCanvas');
const ctx = canvas.getContext('2d');

let stars = [];
const starCount = 260;
const groundHeight = 68;
const connectDistance = 105;

// Новый параметр — вероятность рисования связи (50% меньше)
const connectionChance = 0.48;   // 0.48 = примерно в 2 раза реже, чем раньше

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Star {
    constructor() {
        this.reset();
    }

    reset() {
        this.x = Math.random() * canvas.width;
        this.y = -60 - Math.random() * 180;
        this.size = Math.random() * 37 + 20;
        this.speed = Math.random() * 4.3 + 1.5;
        this.opacity = 0.78 + Math.random() * 0.22;
        this.rotation = Math.random() * Math.PI * 2;
        this.twinkle = Math.random() * Math.PI * 2;
        this.isGrounded = false;
        this.groundTime = 0;
        this.lifeOnGround = 100 + Math.random() * 160;
        this.imageIndex = Math.floor(Math.random() * starImages.length);
    }

    update() {
        if (!this.isGrounded) {
            this.y += this.speed;
            this.twinkle += 0.09;
            this.rotation += 0.017;

            if (this.y >= canvas.height - groundHeight - 24) {
                this.isGrounded = true;
                this.y = canvas.height - groundHeight + (Math.random() * 28) - 14;
                this.speed = 0;
            }
        } else {
            this.twinkle += 0.042;
            this.groundTime++;
            if (this.groundTime > this.lifeOnGround) this.reset();
        }
    }

    draw() {
        if (!starImages[this.imageIndex]) return;
        ctx.save();
        const alpha = this.opacity * (0.74 + Math.sin(this.twinkle) * 0.26);
        ctx.globalAlpha = alpha;

        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        const drawSize = this.size;
        ctx.shadowBlur = this.isGrounded ? 19 : 33;
        ctx.shadowColor = this.isGrounded ? "#ffeb99" : "#99e8ff";

        ctx.drawImage(starImages[this.imageIndex], -drawSize/2, -drawSize/2, drawSize, drawSize);
        ctx.restore();
    }
}

function initStars() {
    stars = [];
    for (let i = 0; i < starCount; i++) {
        const star = new Star();
        star.y = Math.random() * canvas.height * 0.78;
        if (Math.random() > 0.48) {
            star.isGrounded = true;
            star.groundTime = Math.random() * star.lifeOnGround;
        }
        stars.push(star);
    }
}

function drawConstellations() {
    ctx.beginPath();
    ctx.lineWidth = 0.75;

    for (let i = 0; i < stars.length; i++) {
        const s1 = stars[i];
        for (let j = i + 1; j < stars.length; j++) {
            const s2 = stars[j];

            const dx = s1.x - s2.x;
            const dy = s1.y - s2.y;
            const distance = Math.hypot(dx, dy);

            if (distance < connectDistance && distance > 20) {
                // 50% меньше связей + плавная прозрачность
                if (Math.random() > connectionChance) continue;

                const alpha = Math.pow(1 - distance / connectDistance, 1.5) * 0.33;
                ctx.strokeStyle = `rgba(195, 235, 255, ${alpha})`;
                
                ctx.moveTo(s1.x, s1.y);
                ctx.lineTo(s2.x, s2.y);
            }
        }
    }
    ctx.stroke();
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawConstellations();

    stars.forEach(star => {
        star.update();
        star.draw();
    });

    requestAnimationFrame(animate);
}

// ==================== ЗАПУСК ====================
preloadImages(() => {
    console.log(`Загружено ${starImages.length} звёзд`);
    initStars();
    animate();
});
</script>
</body>
</html>
